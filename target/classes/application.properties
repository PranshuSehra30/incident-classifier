# ================================
# Server
# ================================
server.port=8080

# ================================
# Database - MySQL (default)
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/incident_classifier?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Pranshu@30

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================================
# File Upload
# ================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ================================
# Logging
# ================================
logging.level.com.incident=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ================================
# Swagger
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ================================
# Classification Config
# ================================
classifier.min-confidence-threshold=0.1
classifier.chunk-size=paragraph
